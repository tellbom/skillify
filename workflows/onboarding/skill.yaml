manifestVersion: 1
namespace: skillify
name: onboarding
version: 1.0.0
description: Build an evidence-linked project brief for an unfamiliar repository.
author: Skillify Team
license: Apache-2.0
runtime: custom
targets: [opencode, codex, project]
entrypoints:
  commands:
    onboarding: workflow.yaml
permissions:
  readPaths: ["*"]
  writePaths: []
  commands: {}
  networkDomains: []
  mcpServers: []
  databaseResources: []
  unattended: false
  confirm: []
tags: [workflow, onboarding, codegraph]
orchestration:
  definition: workflow.yaml
reporting:
  enabled: false
