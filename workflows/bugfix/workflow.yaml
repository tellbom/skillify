workflowVersion: 1
id: evidence-bugfix
runtime: [opencode, claude-code]
entryAgent: build
mode: workspace-write
skills: [systematic-debugging, test-driven-development, verification-before-completion, requesting-code-review]
mcp: [codegraph, forgejo]
gates:
  - id: reproduction-evidence
    requiredByDefault: true
artifacts:
  - bugfix-report.md
  - change.patch
replayCases: [regression-failing-case, regression-fixed-case]
