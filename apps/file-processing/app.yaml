schemaVersion: 1
appId: file-processing
version: 1.0.0
workflow:
  id: deterministic-file-processing
  version: 1.0.0
  status: published
skills:
  - id: word-frequency
    version: 0.1.0
    status: published
  - id: pivot-analysis
    version: 0.1.0
    status: published
permissions:
  readPaths: ["*"]
  writePaths: ["*"]
  commands: {}
  networkDomains: []
  mcpServers: []
  databaseResources: []
  unattended: false
  confirm: [read, write]
inputSchema:
  type: object
  additionalProperties: false
  required: [inputAlias, processor]
  properties:
    inputAlias: {type: string, minLength: 1}
    processor: {enum: [word-frequency, csv-summary]}
outputSchema:
  type: object
  additionalProperties: false
  required: [outputAlias, changes]
  properties:
    outputAlias: {type: string, minLength: 1}
    changes: {type: array}
