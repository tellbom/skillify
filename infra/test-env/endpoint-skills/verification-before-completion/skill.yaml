manifestVersion: 1
namespace: skillify-acceptance
name: verification-before-completion
version: 1.0.0
permissions:
  readPaths: ["*"]
  writePaths: ["*"]
  commands:
    "git diff *": allow
    "grep *": allow
    "python3 tests/verify.py": allow
  networkDomains: []
  mcpServers: []
  databaseResources: []
  unattended: false
  confirm: [write, command]
