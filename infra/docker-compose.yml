name: skillify

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${FORGEJO_DB_USER:-forgejo}
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD:-forgejo}
      POSTGRES_DB: ${FORGEJO_DB_NAME:-forgejo}
    volumes:
      - forgejo-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FORGEJO_DB_USER:-forgejo}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [skillify]

  forgejo:
    image: codeberg.org/forgejo/forgejo:10
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      USER_UID: 1000
      USER_GID: 1000
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: db:5432
      FORGEJO__database__NAME: ${FORGEJO_DB_NAME:-forgejo}
      FORGEJO__database__USER: ${FORGEJO_DB_USER:-forgejo}
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD:-forgejo}
      FORGEJO__server__DOMAIN: ${FORGEJO_DOMAIN:-localhost}
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:-http://localhost:3000/}
      FORGEJO__server__HTTP_PORT: "3000"
      FORGEJO__service__DISABLE_REGISTRATION: ${FORGEJO_DISABLE_REGISTRATION:-false}
    volumes:
      - forgejo-data:/data
    ports:
      - "${FORGEJO_HTTP_PORT:-3000}:3000"
      - "${FORGEJO_SSH_PORT:-2222}:22"
    networks: [skillify]

  webhook:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      forgejo:
        condition: service_started
    environment:
      SKILLIFY_FORGEJO_URL: ${SKILLIFY_FORGEJO_URL:-http://forgejo:3000}
      SKILLIFY_FORGEJO_TOKEN: ${SKILLIFY_FORGEJO_TOKEN:?set a Forgejo access token for the webhook service}
      SKILLIFY_FORGEJO_ORG: ${SKILLIFY_FORGEJO_ORG:-}
      SKILLIFY_WEBHOOK_SECRET: ${SKILLIFY_WEBHOOK_SECRET:?set a shared secret and configure it on the Forgejo webhook}
      SKILLIFY_DEVPI_INDEX_URL: ${SKILLIFY_DEVPI_INDEX_URL:-http://devpi:3141/skillify/dev/+simple/}
      SKILLIFY_INDEX_DB_URL: ${SKILLIFY_INDEX_DB_URL:?set the external DM8 SQLAlchemy URL}
    command: ["skillify-webhook"]
    ports:
      - "${WEBHOOK_PORT:-8088}:8088"
    networks: [skillify]

  skillify-web:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      forgejo:
        condition: service_started
    environment:
      SKILLIFY_FORGEJO_URL: ${SKILLIFY_FORGEJO_URL:-http://forgejo:3000}
      SKILLIFY_FORGEJO_TOKEN: ${SKILLIFY_FORGEJO_TOKEN:?set a Forgejo access token for Skillify}
      SKILLIFY_FORGEJO_ORG: ${SKILLIFY_FORGEJO_ORG:-}
      SKILLIFY_DEVPI_INDEX_URL: ${SKILLIFY_DEVPI_INDEX_URL:-http://devpi:3141/skillify/dev/+simple/}
      SKILLIFY_INDEX_DB_URL: ${SKILLIFY_INDEX_DB_URL:?set the external DM8 SQLAlchemy URL}
      SKILLIFY_KEYCLOAK_REALM_URL: ${SKILLIFY_KEYCLOAK_REALM_URL:?set the Keycloak realm issuer URL}
      SKILLIFY_KEYCLOAK_AUDIENCE: ${SKILLIFY_KEYCLOAK_AUDIENCE:-skillify-web}
      SKILLIFY_ENDPOINT_DEVICE_SECRET: ${SKILLIFY_ENDPOINT_DEVICE_SECRET:?set the endpoint device token signing secret}
      SKILLIFY_ENDPOINT_TASK_SIGNING_SECRET: ${SKILLIFY_ENDPOINT_TASK_SIGNING_SECRET:?set the endpoint task envelope signing secret}
      SKILLIFY_WEB_UPLOAD_GIT_ENABLED: "true"
    command: ["skillify-web"]
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import requests; requests.get('http://127.0.0.1:8089/healthz', timeout=2).raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [skillify]

  frontend:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
        VITE_KEYCLOAK_REALM_URL: ${VITE_KEYCLOAK_REALM_URL:?set the frontend Keycloak realm URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-skillify-web}
        VITE_RBAC_BASE_URL: ${VITE_RBAC_BASE_URL:?set the Rbac.Api base URL}
        VITE_RBAC_PROJECT: ${VITE_RBAC_PROJECT:-skillify}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      skillify-web:
        condition: service_healthy
    ports:
      - "${SKILLIFY_HTTP_PORT:-8080}:80"
    networks: [skillify]

volumes:
  forgejo-db:
  forgejo-data:

networks:
  skillify:
