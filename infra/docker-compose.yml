name: skillify

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${FORGEJO_DB_USER:-forgejo}
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD:-forgejo}
      POSTGRES_DB: ${FORGEJO_DB_NAME:-forgejo}
    volumes:
      - forgejo-db:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FORGEJO_DB_USER:-forgejo}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [skillify]

  forgejo:
    image: codeberg.org/forgejo/forgejo:10
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      USER_UID: 1000
      USER_GID: 1000
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: db:5432
      FORGEJO__database__NAME: ${FORGEJO_DB_NAME:-forgejo}
      FORGEJO__database__USER: ${FORGEJO_DB_USER:-forgejo}
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD:-forgejo}
      FORGEJO__server__DOMAIN: ${FORGEJO_DOMAIN:-localhost}
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:-http://localhost:3000/}
      FORGEJO__server__HTTP_PORT: "3000"
      FORGEJO__service__DISABLE_REGISTRATION: ${FORGEJO_DISABLE_REGISTRATION:-false}
    volumes:
      - forgejo-data:/data
    ports:
      - "${FORGEJO_HTTP_PORT:-3000}:3000"
      - "${FORGEJO_SSH_PORT:-2222}:22"
    networks: [skillify]

  devpi:
    build: ./devpi
    restart: unless-stopped
    volumes:
      - devpi-data:/data
    ports:
      - "${DEVPI_PORT:-3141}:3141"
    networks: [skillify]

  webhook:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      forgejo:
        condition: service_started
    environment:
      SKILLIFY_FORGEJO_URL: ${SKILLIFY_FORGEJO_URL:-http://forgejo:3000}
      SKILLIFY_FORGEJO_TOKEN: ${SKILLIFY_FORGEJO_TOKEN:?set a Forgejo access token for the webhook service}
      SKILLIFY_WEBHOOK_SECRET: ${SKILLIFY_WEBHOOK_SECRET:?set a shared secret and configure it on the Forgejo webhook}
      SKILLIFY_DEVPI_INDEX_URL: ${SKILLIFY_DEVPI_INDEX_URL:-http://devpi:3141/skillify/dev/+simple/}
      SKILLIFY_INDEX_DB_URL: postgresql+psycopg://${FORGEJO_DB_USER:-forgejo}:${FORGEJO_DB_PASSWORD:-forgejo}@db:5432/skillify_index
    ports:
      - "${WEBHOOK_PORT:-8088}:8088"
    networks: [skillify]

volumes:
  forgejo-db:
  forgejo-data:
  devpi-data:

networks:
  skillify:
